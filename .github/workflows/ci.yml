name: CI

on:
    pull_request:
        branches:
            - main
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
    push:
        branches:
            - main

jobs:
    dotnet-format:
        name: .NET Format
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore ZebraLabels.slnx

            - name: Collect changed C# files
              id: changed-csharp
              uses: tj-actions/changed-files@v46
              with:
                  files: |
                      **/*.cs
                      **/*.csproj

            - name: Show changed C# files
              if: steps.changed-csharp.outputs.any_changed == 'true'
              run: echo "${{ steps.changed-csharp.outputs.all_changed_files }}"

            - name: Verify .NET formatting
              if: steps.changed-csharp.outputs.any_changed == 'true'
              run: dotnet format ZebraLabels.slnx --verify-no-changes --no-restore --include ${{ steps.changed-csharp.outputs.all_changed_files }}

            - name: Skip .NET formatting (no C# changes)
              if: steps.changed-csharp.outputs.any_changed != 'true'
              run: echo "No C# file changed in this PR."

    web-format:
        name: Web Format
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/ZebraLabels.Web/package-lock.json

            - name: Install web dependencies
              run: npm ci --prefix src/ZebraLabels.Web

            - name: Collect changed web files
              id: changed-web
              uses: tj-actions/changed-files@v46
              with:
                  files: |
                      src/ZebraLabels.Web/**/*.{css,html,js,json,svelte,ts,yaml,yml}

            - name: Show changed web files
              if: steps.changed-web.outputs.any_changed == 'true'
              run: echo "${{ steps.changed-web.outputs.all_changed_files }}"

            - name: Verify web formatting
              if: steps.changed-web.outputs.any_changed == 'true'
              run: cd src/ZebraLabels.Web && npx prettier --check .

            - name: Skip web formatting (no related changes)
              if: steps.changed-web.outputs.any_changed != 'true'
              run: echo "No web file changed in this PR."

    markdown-standard:
        name: Markdown Format + Standard
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/ZebraLabels.Web/package-lock.json

            - name: Install web dependencies
              run: npm ci --prefix src/ZebraLabels.Web

            - name: Collect changed markdown files
              id: changed-markdown
              uses: tj-actions/changed-files@v46
              with:
                  files: |
                      **/*.md
                  files_ignore: |
                      **/node_modules/**
                      **/bin/**
                      **/obj/**
                      **/dist/**
                      .git/**

            - name: Show changed markdown files
              if: steps.changed-markdown.outputs.any_changed == 'true'
              run: echo "${{ steps.changed-markdown.outputs.all_changed_files }}"

            - name: Verify markdown formatting
              if: steps.changed-markdown.outputs.any_changed == 'true'
              run: |
                  cd src/ZebraLabels.Web
                  changed_markdown="${{ steps.changed-markdown.outputs.all_changed_files }}"
                  markdown_args=$(printf '%s\n' "$changed_markdown" | tr ' ' '\n' | sed "s#^#$GITHUB_WORKSPACE/#")
                  npx prettier --check $markdown_args

            - name: Verify markdown standards
              if: steps.changed-markdown.outputs.any_changed == 'true'
              run: npx --yes markdownlint-cli2 --config .markdownlint.jsonc ${{ steps.changed-markdown.outputs.all_changed_files }}

            - name: Skip markdown checks (no markdown changes)
              if: steps.changed-markdown.outputs.any_changed != 'true'
              run: echo "No markdown file changed in this PR."

    dotnet-build-test:
        name: .NET Build + Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore ZebraLabels.slnx

            - name: Build
              run: dotnet build ZebraLabels.slnx --configuration Release --no-restore

            - name: Test
              run: dotnet test ZebraLabels.slnx --configuration Release --no-build --verbosity normal

    web-compile:
        name: Web Compile
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/ZebraLabels.Web/package-lock.json

            - name: Install web dependencies
              run: npm ci --prefix src/ZebraLabels.Web

            - name: Type check
              run: npm --prefix src/ZebraLabels.Web run check

            - name: Build
              run: npm --prefix src/ZebraLabels.Web run build
