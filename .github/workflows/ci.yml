name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      dotnet_changed: ${{ steps.changed-dotnet.outputs.any_changed }}
      web_changed: ${{ steps.changed-web.outputs.any_changed }}
      markdown_changed: ${{ steps.changed-markdown.outputs.any_changed }}
      markdown_files: ${{ steps.changed-markdown.outputs.all_changed_files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect .NET related changes
        id: changed-dotnet
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.cs
            **/*.csproj
            **/*.sln
            **/*.slnx
            **/*.props
            **/*.targets

      - name: Detect web related changes
        id: changed-web
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/ZebraLabels.Web/**

      - name: Detect markdown changes
        id: changed-markdown
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.md
          files_ignore: |
            **/node_modules/**
            **/bin/**
            **/obj/**
            **/dist/**
            .git/**

      - name: Summary
        run: |
          echo "dotnet_changed=${{ steps.changed-dotnet.outputs.any_changed }}"
          echo "web_changed=${{ steps.changed-web.outputs.any_changed }}"
          echo "markdown_changed=${{ steps.changed-markdown.outputs.any_changed }}"

  dotnet-format:
    name: .NET Format
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dotnet_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ZebraLabels.slnx

      - name: Collect changed C# files
        id: changed-csharp
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.cs
            **/*.csproj

      - name: Show changed C# files
        run: echo "${{ steps.changed-csharp.outputs.all_changed_files }}"

      - name: Verify .NET formatting
        run: dotnet format ZebraLabels.slnx --verify-no-changes --no-restore --include ${{ steps.changed-csharp.outputs.all_changed_files }}

  web-format:
    name: Web Format
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ZebraLabels.Web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix src/ZebraLabels.Web

      - name: Verify web formatting
        run: cd src/ZebraLabels.Web && npx prettier --check .

  markdown-standard:
    name: Markdown Format + Standard
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.markdown_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ZebraLabels.Web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix src/ZebraLabels.Web

      - name: Show changed markdown files
        run: echo "${{ needs.detect-changes.outputs.markdown_files }}"

      - name: Verify markdown formatting
        run: |
          cd src/ZebraLabels.Web
          changed_markdown="${{ needs.detect-changes.outputs.markdown_files }}"
          markdown_args=$(printf '%s\n' "$changed_markdown" | tr ' ' '\n' | sed "s#^#$GITHUB_WORKSPACE/#")
          npx prettier --check $markdown_args

      - name: Verify markdown standards
        run: npx --yes markdownlint-cli2 --config .markdownlint.jsonc ${{ needs.detect-changes.outputs.markdown_files }}

  dotnet-build-test:
    name: .NET Build + Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dotnet_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ZebraLabels.slnx

      - name: Build
        run: dotnet build ZebraLabels.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ZebraLabels.slnx --configuration Release --no-build --verbosity normal

  web-compile:
    name: Web Compile
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ZebraLabels.Web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix src/ZebraLabels.Web

      - name: Type check
        run: npm --prefix src/ZebraLabels.Web run check

      - name: Build
        run: npm --prefix src/ZebraLabels.Web run build
